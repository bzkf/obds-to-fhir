// groovylint-disable NestedBlockDepth

plugins {
    id 'org.springframework.boot' version '4.1.0'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'jacoco'
    id 'java'
    id 'com.diffplug.spotless' version '8.6.0'
    id 'io.freefair.lombok' version '9.5.0'
    id 'net.ltgt.errorprone' version '5.1.0'
    id 'name.remal.jacoco-to-cobertura' version '2.0.3'
    id 'com.google.cloud.tools.jib' version '3.5.3'
}

group = 'io.github.bzkf'
version = '3.2.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

ext {
    set('springCloudVersion', '2025.1.1')
    set('hapiVersion', '8.10.0')
}

dependencies {
    implementation project(':mappings')

    implementation 'org.apache.kafka:kafka-streams'
    implementation 'org.springframework.cloud:spring-cloud-stream'
    implementation 'org.springframework.cloud:spring-cloud-stream-binder-kafka-streams'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-jdbc'
    implementation 'org.springframework.boot:spring-boot-starter-jdbc'
    implementation "ca.uhn.hapi.fhir:hapi-fhir-structures-r4:${hapiVersion}"
    implementation "ca.uhn.hapi.fhir:hapi-fhir-client:${hapiVersion}"
    implementation 'org.springframework.security:spring-security-oauth2-client'
    implementation 'io.micrometer:micrometer-registry-prometheus:1.16.5'
    implementation 'io.micrometer:micrometer-core:1.16.5'
    implementation 'org.miracum:kafka-fhir-serializer:3.0.0'
    implementation 'com.github.slugify:slugify:4.0.0'
    implementation 'org.springframework.retry:spring-retry'
    implementation 'io.github.java-diff-utils:java-diff-utils:4.17'

    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'

    testImplementation "ca.uhn.hapi.fhir:hapi-fhir-validation:${hapiVersion}"
    testImplementation "ca.uhn.hapi.fhir:hapi-fhir-validation-resources-r4:${hapiVersion}"
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.cloud:spring-cloud-stream-test-support'
    testImplementation 'com.approvaltests:approvaltests:30.1.1'
    testImplementation 'org.apache.kafka:kafka-streams-test-utils'

    errorprone 'com.google.errorprone:error_prone_core:2.49.0'
    errorprone 'com.uber.nullaway:nullaway:0.13.4'

    runtimeOnly 'com.microsoft.sqlserver:mssql-jdbc'
    runtimeOnly 'org.postgresql:postgresql'
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
    }
}

tasks.named('test') {
    useJUnitPlatform()
}

jacoco {
    toolVersion = '0.8.14'
}

spotless {
    java {
        target('**/*.java')
        targetExclude('src/generated/java/**/*.java')
        importOrder()
        removeUnusedImports()
        googleJavaFormat()
    }
}

jacocoTestReport {
    reports {
        csv.required = true
        html.required = true
        xml.required = true
    }
}

// mirrors the final stage of the Dockerfile, minus the libjemalloc.so.2 layer
jib {
    from {
        image = 'gcr.io/distroless/java25-debian13:nonroot@sha256:dade01b669efd3bea3977f73cc196c56f1ee678a71ec8305f84ec15fd5a23c8d'
    }
    to {
        image = 'ghcr.io/bzkf/obds-to-fhir'
    }
    container {
        mainClass = 'io.github.bzkf.obdstofhir.ObdsToFhirApplication'
        jvmFlags = ['-XX:MaxRAMPercentage=75']
        user = '65532:65532'
        appRoot = '/opt/obds-to-fhir'
        workingDirectory = '/opt/obds-to-fhir'
        creationTime = 'USE_CURRENT_TIMESTAMP'
    }
}

import net.ltgt.gradle.errorprone.CheckSeverity

tasks.withType(JavaCompile).configureEach {
    options.errorprone {
        check('NullAway', CheckSeverity.WARN)
        option('NullAway:AnnotatedPackages', 'io.github.bzkf.obdstofhir')
    }
    options.errorprone.disableWarningsInGeneratedCode = true
    // ignore legacy mappers code
    // MeldungExportV3 causes an errorprone exception - likely because it can't handle all the lombok annotations
    options.errorprone.errorproneArgs.add('-XepExcludedPaths:(.*/ADT_GEKID\\.java|.*/MeldungExportV3\\.java'
        + '|.*/lookup/.*|.*/mapper/\\w*\\.java)')
}

// via <https://stackoverflow.com/questions/24936781/gradle-plugin-project-version-number>
task printVersion {
    doLast {
        println project.version
    }
}
