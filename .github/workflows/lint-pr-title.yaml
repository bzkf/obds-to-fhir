name: "Lint PR"

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

permissions: read-all

jobs:
  check-pr-title:
    name: Validate PR title
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - uses: amannn/action-semantic-pull-request@fdd4d3ddf614fbcd8c29e4b106d3bbe0cb2c605d # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
