name: DQ Checks

on:
  pull_request:
    branches:
      - master
      - beta
  release:
    types:
      - created
  push:
    branches:
      - master
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

jobs:
  build:
    uses: miracum/.github/.github/workflows/standard-build.yaml@852cc3bbf5782e17d4d8e9da3392cb134a0fc4ff # v1.21.2
    permissions:
      contents: write
      id-token: write
      packages: write
      pull-requests: write
      actions: read
      security-events: write
    with:
      build-context: dq/
      enable-build-test-layer: false
      enable-upload-test-image: false
      image: "ghcr.io/${{ github.repository }}-dq-checks"
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  run-gx-checks:
    name: run dq checks
    runs-on: ubuntu-24.04
    needs:
      - build
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit # change to 'egress-policy: block' after couple of runs

      # <https://docs.docker.com/storage/containerd/>
      # via <https://github.com/docker/setup-buildx-action/issues/257>
      - name: Set up containerd image store
        shell: bash
        run: |
          [ -f /etc/docker/daemon.json ] || echo "{}" | sudo tee /etc/docker/daemon.json
          jq '. | .+{"features": {"containerd-snapshotter": true}}' /etc/docker/daemon.json > /tmp/docker-daemon-with-containerd.json
          sudo mv /tmp/docker-daemon-with-containerd.json /etc/docker/daemon.json
          cat /etc/docker/daemon.json
          sudo systemctl restart docker
          docker info -f '{{ .DriverStatus }}'

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download image
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.image-slug }}
          path: /tmp

      - name: Load image
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          docker load --input /tmp/image.tar
          docker image ls

      - name: Run checks
        env:
          DQ_CHECKS_IMAGE: "ghcr.io/${{ github.repository }}-dq-checks:${{ needs.build.outputs.image-version }}"
        run: |
          mkdir -p ./data-docs
          sudo chown -R 65532:65532 ./data-docs
          docker run --rm \
            -v ./mappings:/mappings:ro \
            -v ./data-docs:/app/gx/uncommitted/:rw \
            -e READ_FROM_DELTA=False \
            -e SPARK_CHECKPOINT_PATH=/tmp \
            -e BUNDLES_DIR=/mappings/src/test/java/snapshots/io/github/bzkf/obdstofhir/mapper/mii/ObdsToFhirBundleMapperTest/ \
            "${DQ_CHECKS_IMAGE}"

      - name: Upload data docs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gx-data-docs
          path: data-docs/
